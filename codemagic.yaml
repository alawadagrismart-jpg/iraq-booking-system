workflows:
  android-workflow:
    name: Ayn Iraq Virtual Bridge Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
          # تثبيت نسخة محددة جداً من SVG متوافقة مع React Native 0.73
          npm install react-native-svg@15.1.0 
      - name: Extreme Clean & Prebuild
        script: |
          # مسح مجلد أندرويد بالكامل إذا كان موجوداً
          rm -rf android
          # بناء المجلد من الصفر تماماً
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          cd android
          # تنظيف نظام Gradle من أي ملفات مؤقتة
          ./gradlew clean
          # بدء البناء النهائي
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
