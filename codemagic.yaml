workflows:
  android-workflow:
    name: Ayn Iraq Virtual Bridge Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Force Clean & Prebuild (Critical Fix)
        script: |
          # مسح أي بقايا قديمة لمجلد الأندرويد لضمان بناء نظيف 100%
          rm -rf android
          # توليد مجلد أندرويد جديد بناءً على الإعدادات المحدثة في app.json
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          # الدخول للمجلد وعمل تنظيف لـ Gradle قبل تجميع الـ APK
          cd android
          ./gradlew clean
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
