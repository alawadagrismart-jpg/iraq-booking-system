workflows:
  android-workflow:
    name: Iraq Booking System Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Create Android Structure (Essential Step)
        script: |
          # هذا الأمر سيقوم بتوليد مجلد android المفقود
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          # الآن المجلد موجود، يمكننا الدخول إليه والبناء
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
