workflows:
  android-workflow:
    name: Ayn Iraq Virtual Bridge Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild (Critical Step)
        script: |
          # هذا الأمر يقرأ app.json ويصنع مجلد android اللازم للبناء
          npx expo prebuild --platform android --no-install
      - name: Build Android APK
        script: |
          # الدخول للمجلد وبناء النسخة النهائية
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
